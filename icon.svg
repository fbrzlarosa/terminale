<?xml version="1.0" encoding="utf-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
<defs>
	<!-- Full-spectrum diagonal gradient shared by both strokes: the chevron
	     picks up the warm half, the underscore the cool half -->
	<linearGradient id="rainbow" gradientUnits="userSpaceOnUse" x1="76" y1="88" x2="436" y2="424">
		<stop offset="0" stop-color="#FF3B6B"/>
		<stop offset="0.17" stop-color="#FF8A00"/>
		<stop offset="0.34" stop-color="#FFD300"/>
		<stop offset="0.52" stop-color="#2ED573"/>
		<stop offset="0.7" stop-color="#18A6F2"/>
		<stop offset="0.86" stop-color="#6C5CE7"/>
		<stop offset="1" stop-color="#C44CE6"/>
	</linearGradient>
</defs>
<!-- Minimal prompt glyph: a bare ">_" with rounded strokes, no window chrome -->
<path d="M112 124 L244 256 L112 388" fill="none" stroke="url(#rainbow)" stroke-width="72" stroke-linecap="round" stroke-linejoin="round"/>
<line x1="308" y1="388" x2="400" y2="388" stroke="url(#rainbow)" stroke-width="72" stroke-linecap="round"/>
</svg>
