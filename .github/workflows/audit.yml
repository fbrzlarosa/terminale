name: Audit

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"
      - "deny.toml"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  security-events: write

jobs:
  cargo-audit:
    name: cargo-audit (RustSec advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  cargo-deny:
    name: cargo-deny (licenses + sources + bans)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check

  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: rust
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --workspace --all-features
      - uses: github/codeql-action/analyze@v3

  unsafe-review:
    name: cargo-geiger (unsafe code report)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo install cargo-geiger --locked
      - run: cargo geiger --workspace --output-format json > geiger-report.json || true
      - uses: actions/upload-artifact@v7
        with:
          name: cargo-geiger-report
          path: geiger-report.json
