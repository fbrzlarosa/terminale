name: Nightly

on:
  schedule:
    - cron: "0 4 * * *" # 04:00 UTC daily
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  # Opt JS-based actions into Node 24 now (Node 20 is deprecated on runners).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  nightly-build:
    name: Nightly toolchain build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxkbcommon-dev libwayland-dev libxcb1-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libfontconfig1-dev libssl-dev libdbus-1-dev
      - run: cargo build --workspace --all-features
      - run: cargo test --workspace --all-features --no-fail-fast
