# One-off v5 (final): remove the 7 internal cargo-dist plumbing files that
# the manual v0.1.10 recovery uploaded as release assets (per-target
# dist-manifest fragments + the `dist` planner binary). Normal releases
# don't ship them. Self-triggers on push; this file is deleted right after.
name: Recover v0.1.10 release (one-off)

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/recover-v0110-once.yml"

permissions:
  contents: write

jobs:
  trim-assets:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Delete internal plumbing assets from v0.1.10
        run: |
          for name in \
            "aarch64-apple-darwin-dist-manifest.json" \
            "dist" \
            "global-dist-manifest.json" \
            "plan-dist-manifest.json" \
            "x86_64-apple-darwin-dist-manifest.json" \
            "x86_64-pc-windows-msvc-dist-manifest.json" \
            "x86_64-unknown-linux-gnu-dist-manifest.json"; do
            id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/v0.1.10" \
              --jq ".assets[] | select(.name==\"$name\") | .id")
            if [ -n "$id" ]; then
              gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/assets/$id"
              echo "deleted $name ($id)"
            else
              echo "not found: $name"
            fi
          done
