# One-off v4: manually publish the v0.1.10 release (its pipeline's `host`
# job 403s on POST /releases — twice, deterministically) and retro-curate
# the v0.1.8 / v0.1.9 Download tables. Self-triggers on push (paths filter
# below); delete this file once it has run.
#
# What it does:
#   1. create-release: deletes any stale v0.1.10 DRAFT, then creates the
#      release from the failed run's own artifacts (notes come from the
#      dist-manifest.json announcement body, macOS tar.gz rows stripped).
#   2. dmg: rebuilds the two macOS .dmg installers from the v0.1.10 tag
#      (same steps as the release pipeline's macos-app-dmg job) and uploads.
#   3. patch-notes-v0110: inserts the .dmg rows into the Download table.
#   4. patch-old-releases: v0.1.8 + v0.1.9 — insert .dmg rows when missing
#      and drop the macOS .tar.gz rows (assets stay: Homebrew/installer.sh).
name: Recover v0.1.10 release (one-off)

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/recover-v0110-once.yml"

permissions:
  actions: read
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Drop any stale v0.1.10 draft
        run: |
          gh api "repos/$GITHUB_REPOSITORY/releases?per_page=30" \
            --jq '.[] | select(.draft and .tag_name=="v0.1.10") | .id' \
            | xargs -r -I{} gh api -X DELETE "repos/$GITHUB_REPOSITORY/releases/{}"
      - name: Download the failed run's artifacts
        run: |
          gh run download 26841280346 -R "$GITHUB_REPOSITORY" -D dist-artifacts
          find dist-artifacts -type f | sort
      - name: Create release with curated notes + upload assets
        run: |
          manifest=$(find dist-artifacts -name dist-manifest.json | head -1)
          jq -r '.announcement_github_body' "$manifest" > body.md
          # Drop the macOS tar.gz rows now; the dmg rows land after the dmg
          # job has actually built and uploaded the files.
          awk '/^\|/ && /apple-darwin\.tar\.gz/ { next } { print }' body.md > body-new.md
          gh release create v0.1.10 -R "$GITHUB_REPOSITORY" \
            --title "v0.1.10" --notes-file body-new.md
          find dist-artifacts -type f ! -name body.md -print0 \
            | xargs -0 gh release upload v0.1.10 -R "$GITHUB_REPOSITORY" --clobber

  dmg:
    needs: create-release
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v0.1.10
          submodules: recursive
      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}
      - name: Build optimized binary
        run: cargo build --profile dist --target ${{ matrix.target }}
      - name: Assemble terminale.app and wrap it in a .dmg
        run: |
          cargo run -p xtask -- dmg-macos \
            --bin target/${{ matrix.target }}/dist/terminale \
            --target ${{ matrix.target }}
      - name: Upload .dmg (+ checksum) to the Release
        run: |
          pkg=$(ls target/terminale-v*-${{ matrix.target }}.dmg)
          ( cd "$(dirname "$pkg")" && shasum -a 256 "$(basename "$pkg")" > "$(basename "$pkg").sha256" )
          gh release upload v0.1.10 "$pkg" "$pkg.sha256" --clobber

  patch-notes-v0110:
    needs: dmg
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Insert .dmg rows into the Download table
        run: |
          tag="v0.1.10"
          repo="$GITHUB_REPOSITORY"
          base="https://github.com/$repo/releases/download/$tag"
          gh release view "$tag" --repo "$repo" --json body -q .body > body.md
          rows=""
          for target in aarch64-apple-darwin x86_64-apple-darwin; do
            file="terminale-$tag-$target.dmg"
            case "$target" in
              aarch64-*) platform="Apple Silicon macOS (GUI app)";;
              *)         platform="Intel macOS (GUI app)";;
            esac
            rows="$rows| [$file]($base/$file) | $platform | [checksum]($base/$file.sha256) |"$'\n'
          done
          if grep -q "apple-darwin\.dmg" body.md; then
            rows=""
          fi
          awk -v rows="$rows" '
            /^\|/ && /apple-darwin\.tar\.gz/ { next }
            { print }
            /^## Download terminale/ { in_dl=1 }
            in_dl && /^\|-+\|/ { printf "%s", rows; in_dl=0 }
          ' body.md > body-new.md
          if ! cmp -s body.md body-new.md; then
            gh release edit "$tag" --repo "$repo" --notes-file body-new.md
          fi

  patch-old-releases:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Curate v0.1.8 + v0.1.9 Download tables
        run: |
          repo="$GITHUB_REPOSITORY"
          for tag in v0.1.8 v0.1.9; do
            base="https://github.com/$repo/releases/download/$tag"
            gh release view "$tag" --repo "$repo" --json body -q .body > body.md
            rows=""
            for target in aarch64-apple-darwin x86_64-apple-darwin; do
              file="terminale-$tag-$target.dmg"
              case "$target" in
                aarch64-*) platform="Apple Silicon macOS (GUI app)";;
                *)         platform="Intel macOS (GUI app)";;
              esac
              rows="$rows| [$file]($base/$file) | $platform | [checksum]($base/$file.sha256) |"$'\n'
            done
            if grep -q "apple-darwin\.dmg" body.md; then
              rows=""
              echo "$tag: dmg rows already present; only filtering tarball rows"
            fi
            awk -v rows="$rows" '
              /^\|/ && /apple-darwin\.tar\.gz/ { next }
              { print }
              /^## Download terminale/ { in_dl=1 }
              in_dl && /^\|-+\|/ { printf "%s", rows; in_dl=0 }
            ' body.md > body-new.md
            if ! cmp -s body.md body-new.md; then
              gh release edit "$tag" --repo "$repo" --notes-file body-new.md
              echo "$tag: notes updated"
            else
              echo "$tag: nothing to change"
            fi
          done
