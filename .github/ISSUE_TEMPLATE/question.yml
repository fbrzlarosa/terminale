name: Question / discussion
description: Ask a question — prefer Discussions for open-ended topics
title: "[q] "
labels: ["question"]
body:
  - type: markdown
    attributes:
      value: |
        For open-ended discussion, please use [GitHub Discussions](../../discussions) instead.

        Open an issue here only if your question is short, specific, and could resolve with a clear answer.

  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What are you trying to accomplish?
