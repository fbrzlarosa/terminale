# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
# Each entry is transitive (not our direct dep) and unfixable upstream today.
# Re-audited 2026-06-02; revisit on the noted upstream bumps. Keep this list
# tight — only suppress what's unactionable.
ignore = [
    # rsa "Marvin" timing side-channel. Reached through `terminale-ssh`
    # (russh → ssh-key → rsa) — SSH tabs ARE shipped, and the russh
    # 0.45→0.61.1 bump (2026-06-02) cleared russh's OWN advisories but does
    # NOT clear this one: `rsa` still has no constant-time release upstream.
    # Mitigation: prefer ed25519 keys (the AuthMethod docs steer users
    # there). Revisit when RustCrypto/RSA ships a constant-time release.
    { id = "RUSTSEC-2023-0071", reason = "rsa Marvin attack: no constant-time rsa release exists; prefer ed25519 keys" },
    # `paste` unmaintained — transitive via wgpu-hal's macOS `metal` backend.
    { id = "RUSTSEC-2024-0436", reason = "paste unmaintained: transitive via wgpu metal; revisit on wgpu bump" },
]

[licenses]
version = 2
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    # Boost Software License — OSI-approved + FSF-libre, permissive. Reached
    # via `clipboard-win` / `error-code` (transitive through `arboard`, the
    # clipboard backend). Compatible with our dual-MIT/Apache distribution.
    "BSL-1.0",
    # SIL Open Font License — the licence on the bundled symbol/emoji fonts
    # shipped by `epaint_default_fonts` (egui). OSI-approved + FSF-libre.
    "OFL-1.1",
    # Community Data License Agreement (permissive) — covers the Mozilla CA
    # root-certificate *data* in `webpki-roots` (transitive via reqwest/rustls
    # in terminale-ai). A permissive data licence, not a code copyleft.
    "CDLA-Permissive-2.0",
]
exceptions = []
# Crate-specific license clarifications.
[[licenses.clarify]]
# `epaint_default_fonts` is `(MIT OR Apache-2.0) AND OFL-1.1 AND
# LicenseRef-UFL-1.0`. The UFL-1.0 (Ubuntu Font Licence) is a permissive font
# licence with no SPDX id, so cargo-deny can't resolve it from the expression.
# We satisfy the conjunction via the MIT branch + the OFL-1.1 allow above; this
# clarify pins the crate to that vetted combination. The font files themselves
# are bundled by egui and ship under their respective open font licences.
name = "epaint_default_fonts"
expression = "MIT AND OFL-1.1"
license-files = []

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
deny = [
    # forbid Electron-like or webview wrappers — see feedback-no-electron memory
    { name = "tao" },
    { name = "wry" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
