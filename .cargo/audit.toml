# cargo-audit configuration (used by `cargo audit` and the rustsec/audit-check
# CI step). Mirrors the `[advisories] ignore` list in deny.toml — see there for
# the per-advisory justifications. All entries are transitive and unfixable
# upstream today; revisit on the noted dependency bumps.
# Re-audited 2026-06-02.
[advisories]
ignore = [
    "RUSTSEC-2023-0071", # rsa Marvin attack — via terminale-ssh; no upstream fix, prefer ed25519
    "RUSTSEC-2024-0436", # paste unmaintained — transitive via wgpu metal
    "RUSTSEC-2017-0008", # serial unmaintained — transitive via portable-pty
    "RUSTSEC-2026-0002", # lru unsound IterMut — transitive via glyphon
    "RUSTSEC-2025-0119", # number_prefix unmaintained — transitive via self_update/indicatif
]
